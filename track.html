<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Track Complaint</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

  <!-- Navbar -->
  <nav class="bg-white shadow-md p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-blue-600">CIMS</h1>
    <a href="index.html" class="text-blue-500">Home</a>
  </nav>

  <!-- Title -->
  <div class="text-center mt-10">
    <h2 class="text-3xl font-bold">Track Your Complaint</h2>
    <p class="text-gray-600 mt-2">Enter your Complaint ID to check status</p>
  </div>

  <!-- Search Box -->
  <div class="max-w-xl mx-auto mt-8 bg-white p-6 rounded-xl shadow-md text-center">
    <input id="searchID" type="text" placeholder="Enter Complaint ID (e.g. C12345)"
      class="w-full p-3 border rounded-lg mb-4">

    <button onclick="trackComplaint()"
      class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600">
      Track
    </button>
  </div>

  <!-- Result -->
  <div id="result" class="max-w-xl mx-auto mt-6"></div>

  <script>
    function trackComplaint() {
      const id = document.getElementById("searchID").value.trim();

      const complaints = JSON.parse(localStorage.getItem("complaints")) || [];

      const found = complaints.find(c => c.id === id);

      const resultDiv = document.getElementById("result");

      if (found) {
        const statusColor =
          found.status === "Resolved"
            ? "text-green-600"
            : "text-yellow-600";

        resultDiv.innerHTML = `
          <div class="bg-white p-6 rounded-xl shadow-md">
            <h3 class="text-xl font-bold mb-2">Complaint Found</h3>
            <p><strong>ID:</strong> ${found.id}</p>
            <p><strong>Name:</strong> ${found.name}</p>
            <p><strong>Location:</strong> ${found.location}</p>
            <p><strong>Category:</strong> ${found.category}</p>
            <p><strong>Description:</strong> ${found.description}</p>
            <p class="${statusColor} font-semibold mt-2">
              Status: ${found.status}
            </p>
          </div>
        `;
      } else {
        resultDiv.innerHTML = `
          <p class="text-red-500 text-center font-semibold">
            Complaint not found!
          </p>
        `;
      }
    }
  </script>

</body>
</html>
